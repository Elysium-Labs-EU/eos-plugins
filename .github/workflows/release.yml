name: Release

on:
  push:
    tags:
      - "eos-sink-*/v*"
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin name (e.g., eos-sink-loki)"
        required: true
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.parse.outputs.plugin }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "plugin=${{ github.event.inputs.plugin }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            PLUGIN="${TAG%/*}"
            VERSION="${TAG##*/}"
            echo "plugin=${PLUGIN}" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ needs.prepare.outputs.plugin }}/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: ${{ needs.prepare.outputs.plugin }}

  test:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ needs.prepare.outputs.plugin }}/go.mod
      - name: Run tests
        working-directory: ${{ needs.prepare.outputs.plugin }}
        run: go test ./... -v -race

  build:
    needs: [prepare, lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ needs.prepare.outputs.plugin }}/go.mod
      - name: Build binary
        working-directory: ${{ needs.prepare.outputs.plugin }}
        run: |
          PLUGIN="${{ needs.prepare.outputs.plugin }}"
          ARTIFACT="${PLUGIN}-linux-${{ matrix.goarch }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o "../${ARTIFACT}" .
      - name: Verify binary
        run: |
          ARTIFACT="${{ needs.prepare.outputs.plugin }}-linux-${{ matrix.goarch }}"
          ls -lh "${ARTIFACT}"
          file "${ARTIFACT}"
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.prepare.outputs.plugin }}-linux-${{ matrix.goarch }}
          path: ${{ needs.prepare.outputs.plugin }}-linux-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          PLUGIN="${{ needs.prepare.outputs.plugin }}"
          mkdir -p release
          find artifacts -type f -name "${PLUGIN}-linux-*" -exec cp {} release/ \;
          ls -lh release/
      - name: Generate checksums
        run: |
          cd release
          PLUGIN="${{ needs.prepare.outputs.plugin }}"
          sha256sum ${PLUGIN}-linux-* > sha256sums.txt
          cat sha256sums.txt
      - name: Determine if prerelease
        id: prerelease
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.plugin }}/${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.plugin }} ${{ needs.prepare.outputs.version }}
          files: |
            release/${{ needs.prepare.outputs.plugin }}-linux-amd64
            release/${{ needs.prepare.outputs.plugin }}-linux-arm64
            release/sha256sums.txt
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          body: |
            ## ${{ needs.prepare.outputs.plugin }} ${{ needs.prepare.outputs.version }}

            eos log sink plugin; ships logs from eos-managed services to external destinations.

            ### Quick Installation

            ```bash
            curl -sSL https://raw.githubusercontent.com/Elysium-Labs-EU/eos-plugins/main/install.sh | sudo bash -s -- ${{ needs.prepare.outputs.plugin }}
            ```

            ### Manual Installation

            Download the binary for your architecture:
            - **Linux AMD64**: `${{ needs.prepare.outputs.plugin }}-linux-amd64`
            - **Linux ARM64**: `${{ needs.prepare.outputs.plugin }}-linux-arm64`

            ```bash
            chmod +x ${{ needs.prepare.outputs.plugin }}-linux-amd64
            sudo cp ${{ needs.prepare.outputs.plugin }}-linux-amd64 /usr/local/bin/${{ needs.prepare.outputs.plugin }}
            ```

            ### Verify Download

            ```bash
            sha256sum -c sha256sums.txt
            ```

            See the [README](https://github.com/Elysium-Labs-EU/eos-plugins/blob/main/${{ needs.prepare.outputs.plugin }}/README.md) for configuration.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

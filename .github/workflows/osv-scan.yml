name: OSV Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Prebuilt, pinned binary instead of `go install ...@latest`, which compiled
      # the scanner from source on every run (the real slowness) using this repo's
      # own Go toolchain — and would break the moment go.mod requires a newer Go
      # than the runner's ambient toolchain (see eos#34).
      - name: Install osv-scanner (prebuilt, pinned)
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --version

      - name: Run OSV Scanner
        run: ./osv-scanner scan --recursive .
